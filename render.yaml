services:
  # 1. THE RUBY ON RAILS WEB SERVER API INSTANCE
  - type: web
    name: rennlad-academy-api
    runtime: ruby
    # Build Command: Prepares the environment, runs migrations, and seeds/imports puzzles automatically
    buildCommand: "bundle exec rake db:migrate && bundle exec rake db:import_puzzles"
    # Start Command: Spins up your Puma server process
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false # Render will ask you to paste your master key securely into their dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: rennlad-academy-db
          property: connectionString

databases:
  # 2. THE MANAGED CLOUD POSTGRESQL DATABASE INSTANCE
  - name: rennlad-academy-db
    databaseName: rennlad_academy_production
    user: rennlad_admin
    plan: free # You can start on their zero-cost tier and scale up whenever students onboard!