# config/recurring.yml
production:
  # Rails 8 native default worker cleanup
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # ✅ ADDED: Free, automated midnight student performance snapshot tracker
  capture_all_daily_snapshots:
    class: CaptureAllDailySnapshotsJob
    schedule: "0 0 * * *" # Every single night at exactly midnight