test:
    runs-on: ubuntu-latest

    # ✅ THE FIX: Spin up a native, free PostgreSQL database container inside the GitHub runner!
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: rennlad_academy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Ensure the runner waits until PostgreSQL is completely booted up before launching tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential git libyaml-dev pkg-config google-chrome-stable libvips-dev

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      # ✅ THE FIX: Inject environment variable credentials so Rails can log into your runner database!
      # We target 127.0.0.1 to force TCP loopback connection routing instead of looking for empty unix sockets
      - name: Prepare database
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@127.0.0.1:5432/rennlad_academy_test
        run: bin/rails db:test:prepare

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@127.0.0.1:5432/rennlad_academy_test
        run: bundle exec rspec

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore